	<input type="text" name="" placeholder="Enter a Superhero name" id="enter-hero-input">
	<button id="submit-button">Click me</button>
	
	<div>

	</div>

	<p class="subtitle2">Place Of Birth: Long Island, New York</p>
	<h2 id="power-stat-title">Power Stat</h2>

			<tr>
				<th>Intelligence</th>
